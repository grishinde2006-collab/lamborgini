{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Lamborghini Super Trofeo</title>
    <link rel="stylesheet" href="{% static 'main/css/style.css' %}">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
</head>
<body style="background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%); min-height: 100vh;">
    <div class="container" style="padding-top: 50px;">
        <div class="row">
            <div class="col-md-6 col-md-offset-3">
                <div class="panel panel-default" style="background: rgba(255,255,255,0.95); border-radius: 10px;">
                    <div class="panel-heading text-center" style="background: #ff6b00; color: white;">
                        <h3>Регистрация</h3>
                        <p>Lamborghini Super Trofeo</p>
                    </div>
                    <div class="panel-body">
                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %}">
                                    {{ message }}
                                </div>
                            {% endfor %}
                        {% endif %}
                        
                        <form method="post" action="https://lamborgini-auth.onrender.com/register-user/">
                            {% csrf_token %}
                            
                            <div class="form-group">
                                <label>Логин *</label>
                                <input type="text" name="username" class="form-control" required placeholder="Введите логин">
                            </div>
                            
                            <div class="form-group">
                                <label>Email *</label>
                                <input type="email" name="email" class="form-control" required placeholder="Введите email">
                            </div>
                            
                            <div class="form-group">
                                <label>Номер телефона *</label>
                                <input type="tel" name="phone" class="form-control" required placeholder="+7 (999) 123-45-67">
                            </div>
                            
                            <div class="form-group">
                                <label>Пароль *</label>
                                <input type="password" name="password" class="form-control" required placeholder="Минимум 6 символов">
                            </div>
                            
                            <div class="form-group">
                                <label>Подтверждение пароля *</label>
                                <input type="password" name="password2" class="form-control" required placeholder="Повторите пароль">
                            </div>
                            
                            <button type="submit" class="btn btn-primary btn-block" style="background: #ff6b00; border: none;">
                                Зарегистрироваться
                            </button>
                        </form>
                        <hr>
                        <p class="text-center">
                            Уже есть аккаунт? <a href="https://lamborgini-auth.onrender.com/login/">Войти</a>
                        </p>
                        <p class="text-center">
                            <a href="https://lamborgini-full.onrender.com/">← На главную</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
